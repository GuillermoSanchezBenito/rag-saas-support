version: '3.8'

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-rag-support
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: saas-rag-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://rag-api:8000/query
    env_file:
      - .env
    depends_on:
      - rag-api
    restart: unless-stopped
